[pytest]
# Default run excludes tests requiring external resources.
# Opt in with:  -m llm   -m network   -m binary
addopts = -m "not llm and not network and not binary"
markers =
    llm: marks tests that require LLM API calls (needs ANTHROPIC_API_KEY)
    network: marks tests that require network access (registry lookups)
    asyncio: marks tests as async
    binary: requires ffmpeg + whisper-cli on PATH + model file
